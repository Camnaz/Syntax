name = "syntax-web"
main = ".open-next/worker.js"
compatibility_date = "2025-09-11"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[ai]
binding = "AI"

[[routes]]
pattern = "syntax.oleacomputer.com/*"
zone_name = "oleacomputer.com"

[vars]
# Non-secret env vars — secrets are set in Cloudflare Workers dashboard
NEXT_PUBLIC_OBSERVER_FREE_VERIFICATIONS = "3"
# NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_SYNTAX_API_URL,
# NEXT_PUBLIC_SITE_URL, NEXT_PUBLIC_FINNHUB_API_KEY, STRIPE_SECRET_KEY, SUPABASE_SERVICE_ROLE_KEY
# — set these as encrypted secrets in the Cloudflare Workers dashboard
