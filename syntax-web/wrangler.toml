name = "syntax-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
# Non-secret env vars — secrets are set in Cloudflare Pages dashboard
NEXT_PUBLIC_OBSERVER_FREE_VERIFICATIONS = "3"
